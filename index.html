<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spelling Practice</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="page-header">
    <h1>Spelling Practice</h1>
    <p class="subtitle">Listen, then spell the word letter by letter</p>
  </header>

  <div class="layout">
    <!-- Left panel: pending words -->
    <aside class="panel pending-panel">
      <h2>Pending <span class="count" id="pendingCount">0</span></h2>
      <ul id="pendingList" class="word-list"></ul>
    </aside>

    <!-- Center: practice card -->
    <main class="app">
      <section class="card">
        <!-- Voice picker: lets the child try different English voices -->
        <div class="voice-row">
          <label for="voiceSelect">Voice:</label>
          <select id="voiceSelect"></select>
        </div>

        <!-- The current word, shown big so it's easy to read -->
        <div id="word" class="word-display">—</div>

        <div class="buttons">
          <button id="hearBtn" class="btn primary">🔊 Hear the word</button>
          <button id="spellBtn" class="btn success">🎤 Spell it</button>
          <button id="nextBtn" class="btn neutral">➡️ Next word</button>
        </div>

        <div id="status" class="status">Ready when you are!</div>

        <div id="result" class="result"></div>

        <!-- For debugging / transparency: shows what the mic understood -->
        <div id="heard" class="heard"></div>
      </section>

      <footer>
        <p class="tip">Tip: speak each letter slowly — "B... A... T"</p>
      </footer>
    </main>

    <!-- Right panel: completed words -->
    <aside class="panel completed-panel">
      <h2>Completed <span class="count" id="completedCount">0</span></h2>
      <ul id="completedList" class="word-list"></ul>
    </aside>
  </div>

  <!-- Reset bar at the bottom of the page -->
  <div class="reset-row">
    <button id="resetBtn" class="btn danger">🔄 Reset all words</button>
  </div>

  <!-- Order matters: words.js defines the array used by app.js -->
  <script src="words.js"></script>
  <script src="app.js"></script>
</body>
</html>
